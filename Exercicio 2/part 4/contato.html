<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Mundo da Tecnologia</title>
</head>
<body>

    <header>
        <h1>Formulário de Contato</h1>
        <nav>
            <ul>
                <li><a href="index.html">Voltar para a Home</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Envie uma mensagem para nós</h2>
            
            <form action="#" method="POST">
                
                <p>
                    <label for="nome">Nome Completo:</label><br>
                    <input type="text" id="nome" name="nome" required placeholder="Digite seu nome">
                </p>

                <p>
                    <label for="email">E-mail de Contato:</label><br>
                    <input type="email" id="email" name="email" required placeholder="seuemail@exemplo.com">
                </p>

                <p>
                    <label for="assunto">Assunto Principal:</label><br>
                    <select id="assunto" name="assunto" required>
                        <option value="">-- Selecione uma opção --</option>
                        <option value="duvidas">Dúvidas sobre HTML</option>
                        <option value="sugestoes">Sugestões de Conteúdo</option>
                        <option value="parcerias">Parcerias/Comercial</option>
                    </select>
                </p>

                <p>
                    <label for="mensagem">Sua Mensagem:</label><br>
                    <textarea id="mensagem" name="mensagem" rows="6" cols="40" required placeholder="Escreva sua mensagem detalhadamente..."></textarea>
                </p>

                <p>
                    <button type="submit">Enviar Formulário</button>
                </p>

            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Formulário criado para o Exercício 2.</p>
    </footer>

</body>
</html>
